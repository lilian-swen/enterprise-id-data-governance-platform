# Integration test overrides
spring:
  datasource:
    # H2 In-Memory mode: fast and wipes clean after tests
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true # View test data at /h2-console

# Mock or local Redis for testing
redis:
  host: localhost
  port: 6379