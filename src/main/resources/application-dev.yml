# Developer-specific overrides
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/data_governance_db?characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: Lilian
    password: helloworld
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    # Low pool size for local dev to save resources
    initialSize: 2
    minIdle: 2
    maxActive: 5

druid:
  monitor:
    username: druid
    password: "123456"
    allow-ip: 127.0.0.1

redis:
  host: 127.0.0.1
  port: 6379
  pool:
    max-total: 5

logging:
  level:
    root: INFO
    com.idgovern.mapper: DEBUG     # Essential for SQL debugging
    com.idgovern.controller: DEBUG # Essential for request/parameter debugging
    com.idgovern.service: INFO     # Keep at INFO unless debugging a specific bug
    com.idgovern.aspect: DEBUG    # Set to DEBUG to see AOP execution timing

springdoc:
  model-and-view-allowed: true
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html